name: 'Ripple'
description: 'Detect downstream-impacted files on PRs and route owners for approval'
author: 'vivek5071'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  mode:
    description: '"advisory" posts a report only. "gate" also requests reviews from owners.'
    required: false
    default: 'advisory'
  min-symbol-length:
    description: 'Minimum chars for a symbol to trigger Track B grep. Prevents flooding on short names like "get".'
    required: false
    default: '5'
  max-files-to-search:
    description: 'Cap on files scanned by ripgrep. Large monorepos tune this down.'
    required: false
    default: '50000'
  max-owners-per-pr:
    description: 'If more unique owners are found than this cap, falls back to advisory for this run.'
    required: false
    default: '10'
  team-lead:
    description: 'GitHub handle substituted when the PR author is the sole owner of every impacted file.'
    required: false
    default: ''
  bot-patterns:
    description: >
      Comma-separated glob patterns for bot author handles that lack the [bot] suffix
      (e.g. 'renovate,devin-ai,my-deploy-bot'). GitHub App bots ending in [bot] are
      always detected automatically and do not need to be listed here. Matched bot PRs
      are forced into gate mode regardless of the mode input.
    required: false
    default: ''
  ai-api-key:
    description: >
      API key for the LLM endpoint configured in .ripple.yml under ai-review.api-url.
      Only required when ai-review.enabled is true in .ripple.yml. Masked in all logs.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install ripgrep
      shell: bash
      run: |
        if ! command -v rg &> /dev/null; then
          sudo apt-get install -y ripgrep
        fi
    - name: Run Ripple
      shell: bash
      env:
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_MIN-SYMBOL-LENGTH: ${{ inputs.min-symbol-length }}
        INPUT_MAX-FILES-TO-SEARCH: ${{ inputs.max-files-to-search }}
        INPUT_MAX-OWNERS-PER-PR: ${{ inputs.max-owners-per-pr }}
        INPUT_TEAM-LEAD: ${{ inputs.team-lead }}
        INPUT_BOT-PATTERNS: ${{ inputs.bot-patterns }}
        INPUT_AI-API-KEY: ${{ inputs.ai-api-key }}
      run: node ${{ github.action_path }}/dist/index.js

branding:
  icon: 'radio'
  color: 'orange'
